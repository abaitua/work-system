<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作量统计系统</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft Yahei",sans-serif;font-size:14px;}
        body{background:#f5f7fa;padding:10px;}
        .container{max-width:1200px;margin:0 auto;background:#fff;padding:15px;border-radius:6px;box-shadow:0 1px 6px #ddd;}
        h2{text-align:center;margin-bottom:12px;color:#333;font-size:18px;}
        h3{margin:10px 0 6px 0;color:#444;font-size:15px;}
        h4{font-size:14px;margin:6px 0;}
        .btn{padding:5px 10px;background:#409eff;color:#fff;border:none;border-radius:3px;cursor:pointer;margin:2px 4px;}
        .btn:hover{background:#66b1ff;}
        .btn-danger{background:#f56c6c;}
        .btn-danger:hover{background:#f78989;}
        .btn-success{background:#67c23a;}
        .btn-success:hover{background:#85ce61;}
        .login-box{max-width:400px;margin:30px auto;border:1px solid #eee;padding:20px;border-radius:6px;}
        .login-item{margin:10px 0;}
        .login-item label{display:block;margin-bottom:3px;}
        .login-item input{width:100%;padding:5px;border:1px solid #ccc;border-radius:3px;}
        .tab{margin:12px 0;text-align:center;}
        table{width:100%;border-collapse:collapse;margin:10px 0;}
        th,td{border:1px solid #ccc;padding:6px;text-align:center;}
        th{background:#f8f9fa;}
        input[type="number"]{width:100%;padding:5px;border:1px solid #ddd;border-radius:3px;}
        .hide{display:none;}
        .split{margin:12px 0;border-top:1px solid #eee;}
        .select-row{margin:8px 0;gap:8px;display:flex;flex-wrap:wrap;align-items:center;justify-content:center;}
        .select-row select{padding:5px;border:1px solid #ccc;border-radius:3px;min-width:90px;}
        .work-item-list{max-width:550px;margin:10px auto;}
        .work-item-row{display:flex;align-items:center;gap:6px;margin:5px auto;padding:5px;border:1px solid #eee;border-radius:3px;}
        .work-item-row input{flex:1;padding:4px;border:1px solid #ccc;border-radius:3px;}
        .time-config-row{display:flex;align-items:center;gap:8px;margin:4px auto;padding:4px;border:1px solid #eee;border-radius:3px;max-width:500px;}
        .time-config-row input{width:70px;padding:4px;}
        #staffManageList > div{margin:4px auto;padding:6px;border:1px solid #eee;border-radius:3px;max-width:800px;}
        #staffManageList input{width:110px;padding:4px;margin:0 4px;}
        .total-hour{color:#e64340;font-weight:bold;}
        div{text-align:center;}
    </style>
</head>
<body>
<div class="container">
    <div id="pageLogin">
        <h2>工作量统计系统 - 登录</h2>
        <div class="tab">
            <button class="btn" type="button" onclick="switchLogin('staff')">员工登录</button>
            <button class="btn btn-success" type="button" onclick="switchLogin('admin')">管理员登录</button>
        </div>
        <div class="login-box" id="staffLogin">
            <div class="login-item">
                <label>姓名</label>
                <input type="text" id="staffName">
            </div>
            <div class="login-item">
                <label>密码</label>
                <input type="password" id="staffPwd">
            </div>
            <div style="text-align:center;">
                <button class="btn btn-success" type="button" id="btnStaffLogin">登录</button>
            </div>
        </div>
        <div class="login-box hide" id="adminLogin">
            <div class="login-item">
                <label>管理员账号</label>
                <input type="text" id="adminUser">
            </div>
            <div class="login-item">
                <label>管理员密码</label>
                <input type="password" id="adminPwd">
            </div>
            <div style="text-align:center;">
                <button class="btn btn-success" type="button" id="btnAdminLogin">登录</button>
            </div>
        </div>
    </div>

    <div id="pageStaffDate" class="hide">
        <h2>欢迎：<span id="currStaffName"></span></h2>
        <button class="btn" type="button" onclick="logout()">退出登录</button>
        <div class="select-row">
            <select id="selYear"></select>
            <select id="selMonth"></select>
            <select id="selDay"></select>
            <button class="btn btn-success" onclick="goDetail()">进入填写</button>
        </div>
    </div>

    <div id="pageStaffDetail" class="hide">
        <h2><span id="detailStaffName"></span> <span id="selectDateText"></span> - 工作次数填写</h2>
        <button class="btn" type="button" onclick="backToDate()">返回日期选择</button>
        <table>
            <thead>
                <tr>
                    <th>工作内容</th>
                    <th>填写次数</th>
                </tr>
            </thead>
            <tbody id="detailTable"></tbody>
        </table>
        <button class="btn btn-success" type="button" onclick="saveStaffWork()">保存数据</button>
    </div>

    <div id="pageWorkEdit" class="hide">
        <h2>工作内容编辑</h2>
        <button class="btn" onclick="backToAdmin()">返回管理员后台</button>
        <div class="split"></div>
        <div style="max-width:550px;margin:0 auto;">
            <button class="btn btn-success" onclick="addWorkItem()">新增工作项</button>
            <button class="btn" onclick="saveWorkList()">保存修改</button>
            <div id="workItemList" class="work-item-list"></div>
        </div>
    </div>

    <div id="pageTimeConfig" class="hide">
        <h2>工时标准配置</h2>
        <button class="btn" onclick="backToAdmin()">返回管理员后台</button>
        <div class="split"></div>
        <h4>设置每项工作单次耗时(分钟)，修改后全局生效</h4>
        <div id="timeConfigWrap"></div>
        <button class="btn btn-success" style="margin-top:10px;" onclick="saveTimeConfig()">保存配置</button>
    </div>

    <div id="pageAdmin" class="hide">
        <h2>管理员后台</h2>
        <button class="btn btn-danger" type="button" onclick="logout()">退出登录</button>
        <button class="btn btn-success" onclick="goWorkEdit()">编辑工作内容</button>
        <button class="btn" onclick="goTimeConfig()">工时标准配置</button>

        <div class="split"></div>
        <h3>修改管理员密码</h3>
        <div class="login-item" style="max-width:400px;margin:0 auto;">
            <label>原密码</label>
            <input type="password" id="oldAdminPwd">
            <label>新密码</label>
            <input type="password" id="newAdminPwd">
            <label>确认新密码</label>
            <input type="password" id="confirmAdminPwd">
            <button class="btn btn-success" type="button" onclick="updateAdminPwd()" style="margin-top:6px;">保存修改</button>
        </div>

        <div class="split"></div>
        <h3>一、员工管理（新增/删除/修改密码）</h3>
        <div class="login-item" style="max-width:400px;margin:0 auto;">
            <label>新员工姓名</label>
            <input type="text" id="newStaffName">
            <label>登录密码</label>
            <input type="password" id="newStaffPwd">
            <button class="btn btn-success" type="button" onclick="addStaff()" style="margin-top:6px;">新增员工</button>
        </div>
        <div id="staffManageList"></div>

        <div class="split"></div>
        <h3>数据清理</h3>
        <div class="select-row">
            <select id="delStaffSel">
                <option value="">全部员工</option>
            </select>
            <select id="delYearSel"></select>
            <select id="delMonthSel"></select>
            <button class="btn btn-danger" onclick="delMonthData()">删除所选年月数据</button>
        </div>

        <div class="split"></div>
        <h3>二、全员月度工时汇总（已换算为小时）</h3>
        <div class="select-row">
            <span>查询月份：</span>
            <select id="queryYear"></select>
            <select id="queryMonth"></select>
            <button class="btn" onclick="refreshTotalTable()">查询</button>
        </div>
        <table>
            <thead id="totalTableHead">
                <tr>
                    <th>人员</th>
                </tr>
            </thead>
            <tbody id="totalTableBody"></tbody>
        </table>

        <div class="split"></div>
        <h3>三、系统操作日志（北京时间）</h3>
        <div class="select-row" style="margin:6px 0;">
            <select id="logStaffSel">
                <option value="">全部员工</option>
            </select>
            <input type="date" id="logDateFilter" placeholder="选择日期">
            <button class="btn" onclick="loadLogList()">查询日志</button>
            <button class="btn btn-danger" onclick="clearAllLog()">清空全部日志</button>
        </div>
        <div>
            <table>
                <thead>
                    <tr>
                        <th>操作时间</th>
                        <th>操作人</th>
                        <th>操作类型</th>
                        <th>操作详情</th>
                        <th>次数明细</th>
                    </tr>
                </thead>
                <tbody id="logTable"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
let API_BASE = "";
let STAFF_LIST = [];
let WORK_LIST = [];
let WORK_TIME_MAP = {};
let currStaffId = "";
let currStaffName = "";
let adminUsername = "";
let adminPwd = "";
let ALL_WORK_DATA = {};

const DEFAULT_TIME_MAP = {
    "首件": 20,
    "巡检": 20,
    "入库": 10,
    "出货": 10,
    "外箱标": 10,
    "内箱标": 10,
    "特标": 10,
    "工单打印": 10,
    "核对物料": 10
};

// 本地存储键名
const STORAGE_KEY_LOGIN = "work_system_login";
const STORAGE_KEY_TIME = "work_system_time_map";

// 读取本地工时配置
function loadLocalTimeMap() {
    const local = localStorage.getItem(STORAGE_KEY_TIME);
    if(local){
        try{
            WORK_TIME_MAP = JSON.parse(local);
        }catch(e){
            WORK_TIME_MAP = {...DEFAULT_TIME_MAP};
        }
    }else{
        WORK_TIME_MAP = {...DEFAULT_TIME_MAP};
    }
}

// 保存工时配置到本地
function saveLocalTimeMap() {
    localStorage.setItem(STORAGE_KEY_TIME, JSON.stringify(WORK_TIME_MAP));
}

// 保存登录状态到本地
function saveLoginStatus(type, data) {
    localStorage.setItem(STORAGE_KEY_LOGIN, JSON.stringify({type, data}));
}

// 清除本地登录状态
function clearLoginStatus() {
    localStorage.removeItem(STORAGE_KEY_LOGIN);
}

// 自动恢复登录
async function autoLogin() {
    const loginStr = localStorage.getItem(STORAGE_KEY_LOGIN);
    if(!loginStr) return false;
    try{
        const loginInfo = JSON.parse(loginStr);
        const {type, data} = loginInfo;
        if(type === "staff"){
            currStaffId = data.id;
            currStaffName = data.name;
            document.getElementById('currStaffName').innerText = currStaffName;
            showPage('pageStaffDate');
            return true;
        }else if(type === "admin"){
            adminUsername = data.username;
            adminPwd = data.pwd;
            showPage('pageAdmin');
            await renderAdminPage();
            refreshTotalTable();
            return true;
        }
    }catch(e){}
    clearLoginStatus();
    return false;
}

// 北京时间转换
function formatChinaTime(timeStr) {
    const date = new Date(timeStr);
    const localTime = new Date(date.getTime() + 8 * 60 * 60 * 1000);
    const year = localTime.getFullYear();
    const month = String(localTime.getMonth() + 1).padStart(2, '0');
    const day = String(localTime.getDate()).padStart(2, '0');
    const h = String(localTime.getHours()).padStart(2, '0');
    const m = String(localTime.getMinutes()).padStart(2, '0');
    const s = String(localTime.getSeconds()).padStart(2, '0');
    return `${year}-${month}-${day} ${h}:${m}:${s}`;
}

function showPage(pageId) {
    document.querySelectorAll('.container > div').forEach(el => el.classList.add('hide'));
    document.getElementById(pageId).classList.remove('hide');
}

function switchLogin(type) {
    document.getElementById('staffLogin').classList.add('hide');
    document.getElementById('adminLogin').classList.add('hide');
    if (type === 'staff') {
        document.getElementById('staffLogin').classList.remove('hide');
    } else {
        document.getElementById('adminLogin').classList.remove('hide');
    }
}

function logout() {
    currStaffId = "";
    currStaffName = "";
    adminUsername = "";
    adminPwd = "";
    ALL_WORK_DATA = {};
    clearLoginStatus();
    showPage('pageLogin');
}

function initDateSelect() {
    const now = new Date();
    const currYear = now.getFullYear();
    const currMonth = now.getMonth() + 1;
    const currDay = now.getDate();

    const yearSel = document.getElementById("selYear");
    const monthSel = document.getElementById("selMonth");
    const daySel = document.getElementById("selDay");
    const delYearSel = document.getElementById("delYearSel");
    const delMonthSel = document.getElementById("delMonthSel");
    const queryYear = document.getElementById("queryYear");
    const queryMonth = document.getElementById("queryMonth");

    yearSel.innerHTML = "";
    delYearSel.innerHTML = "";
    queryYear.innerHTML = "";
    for (let y = currYear - 5; y <= currYear + 2; y++) {
        yearSel.innerHTML += `<option value="${y}">${y}</option>`;
        delYearSel.innerHTML += `<option value="${y}">${y}</option>`;
        queryYear.innerHTML += `<option value="${y}">${y}</option>`;
    }

    monthSel.innerHTML = "";
    delMonthSel.innerHTML = "";
    queryMonth.innerHTML = "";
    for (let m = 1; m <= 12; m++) {
        monthSel.innerHTML += `<option value="${m}">${m}</option>`;
        delMonthSel.innerHTML += `<option value="${m}">${m}</option>`;
        queryMonth.innerHTML += `<option value="${m}">${m}</option>`;
    }

    function fillDay(y, m) {
        daySel.innerHTML = "";
        const lastDay = new Date(y, m, 0).getDate();
        for (let d = 1; d <= lastDay; d++) {
            daySel.innerHTML += `<option value="${d}">${d}</option>`;
        }
    }

    fillDay(currYear, currMonth);
    yearSel.value = currYear;
    monthSel.value = currMonth;
    daySel.value = currDay;
    delYearSel.value = currYear;
    delMonthSel.value = currMonth;
    queryYear.value = currYear;
    queryMonth.value = currMonth;

    yearSel.onchange = () => fillDay(+yearSel.value, +monthSel.value);
    monthSel.onchange = () => fillDay(+yearSel.value, +monthSel.value);
}

async function loadBaseData() {
    try {
        const res = await fetch(`${API_BASE}/api/getWorkList`);
        const json = await res.json();
        if (json.code === 0) {
            WORK_LIST = json.list || [];
        }
    } catch (e) {
        WORK_LIST = ["首件", "巡检", "入库", "出货", "外箱标", "内箱标", "特标", "工单打印", "核对物料"];
    }
    // 优先使用本地持久化工时配置
    loadLocalTimeMap();
}

async function staffLogin() {
    const name = document.getElementById('staffName').value.trim();
    const pwd = document.getElementById('staffPwd').value.trim();
    if (!name || !pwd) return alert("请输入姓名和密码");

    try {
        const res = await fetch(`${API_BASE}/api/staff/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, pwd })
        });
        const json = await res.json();
        if (json.code === 0) {
            currStaffId = json.id;
            currStaffName = json.name;
            // 保存登录状态
            saveLoginStatus("staff", {id: json.id, name: json.name});
            document.getElementById('currStaffName').innerText = currStaffName;
            showPage('pageStaffDate');
        } else {
            alert(json.msg || "登录失败");
        }
    } catch (e) {
        alert("网络请求失败");
    }
}

async function goDetail() {
    const y = document.getElementById('selYear').value;
    const m = String(document.getElementById('selMonth').value).padStart(2, '0');
    const d = String(document.getElementById('selDay').value).padStart(2, '0');
    const dateStr = `${y}-${m}-${d}`;

    document.getElementById('detailStaffName').innerText = currStaffName;
    document.getElementById('selectDateText').innerText = `${y}年${m}月${d}日`;

    let workArr = [];
    try {
        const res = await fetch(`${API_BASE}/api/getStaffWork/${currStaffId}`);
        const json = await res.json();
        workArr = json[dateStr] || [];
    } catch (e) { }

    const table = document.getElementById('detailTable');
    table.innerHTML = "";
    WORK_LIST.forEach((name, idx) => {
        const count = Number(workArr[idx]) || 0;
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${name}</td>
            <td><input type="number" min="0" id="count_${idx}" value="${count}"></td>
        `;
        table.appendChild(tr);
    });
    showPage('pageStaffDetail');
}

function backToDate() {
    showPage('pageStaffDate');
}

async function saveStaffWork() {
    const workArr = [];
    WORK_LIST.forEach((_, idx) => {
        workArr.push(Number(document.getElementById(`count_${idx}`).value) || 0);
    });
    const y = document.getElementById('selYear').value;
    const m = String(document.getElementById('selMonth').value).padStart(2, '0');
    const d = String(document.getElementById('selDay').value).padStart(2, '0');
    const dateStr = `${y}-${m}-${d}`;

    let detailStr = "";
    workArr.forEach((val, idx) => {
        detailStr += `${WORK_LIST[idx] || "未知项"}:${val}次；`;
    });

    try {
        const res = await fetch(`${API_BASE}/api/saveWorkData`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                staffId: currStaffId,
                day: dateStr,
                workArr: workArr,
                staffName: currStaffName
            })
        });
        const json = await res.json();
        alert(json.msg || "保存成功");
    } catch (e) {
        alert("保存失败");
    }
}

async function adminLogin() {
    const user = document.getElementById('adminUser').value.trim();
    const pwd = document.getElementById('adminPwd').value.trim();
    if (!user || !pwd) return alert("请输入账号密码");

    try {
        const res = await fetch(`${API_BASE}/api/admin/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: user, pwd })
        });
        const json = await res.json();
        if (json.code === 0) {
            adminUsername = user;
            adminPwd = pwd;
            // 保存管理员登录状态
            saveLoginStatus("admin", {username: user, pwd: pwd});
            showPage('pageAdmin');
            await renderAdminPage();
            refreshTotalTable();
        } else {
            alert(json.msg || "登录失败");
        }
    } catch (e) {
        alert("网络请求失败");
    }
}

async function renderAdminPage() {
    try {
        const res = await fetch(`${API_BASE}/api/getAllData`);
        const json = await res.json();
        STAFF_LIST = json.staffList || [];
        ALL_WORK_DATA = json.workData || {};
    } catch (e) {
        STAFF_LIST = [];
        ALL_WORK_DATA = {};
    }

    const staffSel = document.getElementById('delStaffSel');
    const logSel = document.getElementById('logStaffSel');
    const staffBox = document.getElementById('staffManageList');
    staffSel.innerHTML = `<option value="">全部员工</option>`;
    logSel.innerHTML = `<option value="">全部员工</option>`;
    staffBox.innerHTML = "<h4>现有员工列表</h4>";

    STAFF_LIST.forEach(staff => {
        staffSel.innerHTML += `<option value="${staff.id}">${staff.name}</option>`;
        logSel.innerHTML += `<option value="${staff.id}">${staff.name}</option>`;
        const div = document.createElement('div');
        div.innerHTML = `
            姓名：${staff.name} &nbsp;&nbsp; 密码：${staff.pwd}
            <input type="password" id="editPwd_${staff.id}" placeholder="新密码">
            <button class="btn" onclick="updateStaffPwd('${staff.id}')">修改密码</button>
            <button class="btn btn-danger" onclick="delStaff('${staff.id}')">删除</button>
        `;
        staffBox.appendChild(div);
    });
}

function goWorkEdit() {
    showPage('pageWorkEdit');
    renderWorkItemList();
}
function backToAdmin() {
    showPage('pageAdmin');
}
function renderWorkItemList() {
    const wrap = document.getElementById('workItemList');
    wrap.innerHTML = "";
    WORK_LIST.forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = "work-item-row";
        div.innerHTML = `
            <input type="text" value="${item}" data-idx="${idx}">
            <button class="btn btn-danger" onclick="delWorkItem(this)">删除</button>
        `;
        wrap.appendChild(div);
    });
}
function addWorkItem() {
    const wrap = document.getElementById('workItemList');
    const div = document.createElement('div');
    div.className = "work-item-row";
    div.innerHTML = `
        <input type="text" placeholder="请输入工作内容">
        <button class="btn btn-danger" onclick="delWorkItem(this)">删除</button>
    `;
    wrap.appendChild(div);
}
function delWorkItem(btn) {
    btn.parentElement.remove();
}
async function saveWorkList() {
    const inputs = document.querySelectorAll(".work-item-row input");
    const newList = [];
    inputs.forEach(inp => {
        const val = inp.value.trim();
        if (val) newList.push(val);
    });
    if (newList.length === 0) return alert("工作项不能为空");

    try {
        const res = await fetch(`${API_BASE}/api/saveWorkList`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ list: newList })
        });
        const json = await res.json();
        if (json.code === 0) {
            WORK_LIST = newList;
            // 重置新增工作项工时并持久化
            WORK_LIST.forEach(name => {
                if(!WORK_TIME_MAP[name]) WORK_TIME_MAP[name] = 10;
            });
            saveLocalTimeMap();
            alert("保存成功");
            backToAdmin();
        } else {
            alert(json.msg);
        }
    } catch (e) {
        alert("保存失败");
    }
}

function goTimeConfig() {
    showPage('pageTimeConfig');
    renderTimeConfig();
}
function renderTimeConfig() {
    const wrap = document.getElementById('timeConfigWrap');
    wrap.innerHTML = "";
    WORK_LIST.forEach(name => {
        const min = WORK_TIME_MAP[name] || 10;
        const div = document.createElement('div');
        div.className = "time-config-row";
        div.innerHTML = `
            <span style="width:100px;">${name}</span>
            <input type="number" min="0" value="${min}" data-name="${name}">
            <span>分钟/次</span>
        `;
        wrap.appendChild(div);
    });
}
async function saveTimeConfig() {
    const inputs = document.querySelectorAll(".time-config-row input");
    inputs.forEach(inp => {
        const name = inp.dataset.name;
        const val = Number(inp.value) || 0;
        WORK_TIME_MAP[name] = val;
    });
    // 1. 保存到本地持久化
    saveLocalTimeMap();
    // 2. 同步保存到后端（全局生效）
    try {
        await fetch(`${API_BASE}/api/saveTimeConfig`, {
            method: "POST",

            body: JSON.stringify(WORK_TIME_MAP)
        });
    } catch (e) {}

    backToAdmin();
}

// 核心：适配后端 workData 结构 + 日期补零匹配
function refreshTotalTable() {
    const qYear = document.getElementById('queryYear').value;
    const qMonth = document.getElementById('queryMonth').value;
    const prefix = `${qYear}-${String(qMonth).padStart(2, '0')}`;
    const lastDay = new Date(qYear, qMonth, 0).getDate();

    const head = document.getElementById('totalTableHead');
    const body = document.getElementById('totalTableBody');

    let headHtml = `<tr><th>人员</th>`;
    WORK_LIST.forEach(item => headHtml += `<th>${item}(小时)</th>`);
    headHtml += `<th>月度合计(小时)</th></tr>`;
    head.innerHTML = headHtml;

    let allRows = "";
    STAFF_LIST.forEach(staff => {
        const userWork = ALL_WORK_DATA[staff.id] || {};
        let monthTotalMin = 0;
        const itemHourArr = WORK_LIST.map(() => 0);

        for (let d = 1; d <= lastDay; d++) {
            const dayStr = `${prefix}-${String(d).padStart(2, '0')}`;
            const countArr = userWork[dayStr] || [];
            countArr.forEach((count, idx) => {
                const name = WORK_LIST[idx];
                const onceMin = WORK_TIME_MAP[name] || 10;
                const dayMin = count * onceMin;
                monthTotalMin += dayMin;
                itemHourArr[idx] += dayMin / 60;
            });
        }

        let trHtml = `<td>${staff.name}</td>`;
        itemHourArr.forEach(h => trHtml += `<td>${h.toFixed(2)}</td>`);
        const totalHour = (monthTotalMin / 60).toFixed(2);
        trHtml += `<td class="total-hour">${totalHour}</td>`;
        allRows += `<tr>${trHtml}</tr>`;
    });
    body.innerHTML = allRows;
}

async function loadLogList() {
    const filterStaffId = document.getElementById('logStaffSel').value;
    const filterDate = document.getElementById('logDateFilter').value;
    const logTable = document.getElementById('logTable');

    try {
        const res = await fetch(`${API_BASE}/api/admin/getLog`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                username: adminUsername,
                pwd: adminPwd,
                filterStaffId: filterStaffId,
                filterDate: filterDate
            })
        });
        const json = await res.json();
        if (json.code !== 0) {
            logTable.innerHTML = `<tr><td colspan="5" style="text-align:center;">获取日志失败</td></tr>`;
            return;
        }
        const logList = json.data || [];
        logTable.innerHTML = "";
        if (logList.length === 0) {
            logTable.innerHTML = `<tr><td colspan="5" style="text-align:center;">暂无日志</td></tr>`;
            return;
        }
        let html = "";
        logList.forEach(log => {
            const fmtTime = formatChinaTime(log.time);
            let detail = log.workDetail || "";
            detail = detail.replace(/工时/g, "次");
            html += `
            <tr>
                <td>${fmtTime}</td>
                <td>${log.operator}</td>
                <td>${log.type}</td>
                <td>${log.content}</td>
                <td>${detail}</td>
            </tr>`;
        });
        logTable.innerHTML = html;
    } catch (e) {
        logTable.innerHTML = `<tr><td colspan="5" style="text-align:center;">请求异常</td></tr>`;
    }
}
