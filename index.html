<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作量统计系统</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft Yahei",sans-serif;}
        body{background:#f5f7fa;padding:20px;}
        .container{max-width:1200px;margin:0 auto;background:#fff;padding:25px;border-radius:8px;box-shadow:0 2px 10px #ddd;}
        h2{text-align:center;margin-bottom:25px;color:#333;}
        h3{margin:16px 0 8px;color:#444;}
        .btn{padding:8px 16px;background:#409eff;color:#fff;border:none;border-radius:4px;cursor:pointer;margin:5px;}
        .btn:hover{background:#66b1ff;}
        .btn-danger{background:#f56c6c;}
        .btn-danger:hover{background:#f78989;}
        .btn-success{background:#67c23a;}
        .btn-success:hover{background:#85ce61;}
        .login-box{max-width:400px;margin:50px auto;border:1px solid #eee;padding:30px;border-radius:8px;}
        .login-item{margin:15px 0;}
        .login-item label{display:block;margin-bottom:5px;}
        .login-item input{width:100%;padding:8px;border:1px solid #ccc;border-radius:4px;}
        .tab{margin:20px 0;text-align:center;}
        .tab button{margin:0 10px;}
        table{width:100%;border-collapse:collapse;margin:20px 0;}
        th,td{border:1px solid #ccc;padding:10px;text-align:center;}
        th{background:#f8f9fa;}
        input[type="number"]{width:100%;padding:6px;border:1px solid #ddd;border-radius:4px;}
        .hide{display:none;}
        .split{margin:30px 0;border-top:1px solid #eee;}
        .select-row{margin:20px 0;gap:10px;display:flex;flex-wrap:wrap;align-items:center;}
        .select-row select{padding:8px;border:1px solid #ccc;border-radius:4px;min-width:100px;}
        .log-box{border:1px solid #eee;padding:12px;margin:10px 0;max-height:300px;overflow:auto;}
        .staff-row{display:flex;align-items:center;gap:8px;margin:8px 0;padding:8px;border:1px solid #eee;flex-wrap:wrap;}
    </style>
</head>
<body>
<div class="container">
    <div id="pageLogin">
        <h2>工作量统计系统 - 登录</h2>
        <div class="tab">
            <button class="btn" type="button" onclick="switchLogin('staff')">员工登录</button>
            <button class="btn btn-success" type="button" onclick="switchLogin('admin')">管理员登录</button>
        </div>
        <div class="login-box" id="staffLogin">
            <div class="login-item">
                <label>姓名</label>
                <input type="text" id="staffName">
            </div>
            <div class="login-item">
                <label>密码</label>
                <input type="password" id="staffPwd">
            </div>
            <div style="text-align:center;">
                <button class="btn btn-success" type="button" id="staffLoginBtn">登录</button>
            </div>
        </div>
        <div class="login-box hide" id="adminLogin">
            <div class="login-item">
                <label>管理员账号</label>
                <input type="text" id="adminUser">
            </div>
            <div class="login-item">
                <label>管理员密码</label>
                <input type="password" id="adminPwd">
            </div>
            <div style="text-align:center;">
                <button class="btn btn-success" type="button" id="adminLoginBtn">登录</button>
            </div>
        </div>
    </div>

    <div id="pageStaffDate" class="hide">
        <h2>欢迎：<span id="currStaffName"></span></h2>
        <button class="btn" type="button" onclick="logout()">退出登录</button>
        <div class="select-row">
            <select id="selYear"></select>
            <select id="selMonth"></select>
            <select id="selDay"></select>
            <button class="btn btn-success" onclick="goDetail()">进入填写</button>
        </div>
    </div>

    <div id="pageStaffDetail" class="hide">
        <h2><span id="detailStaffName"></span> <span id="selectDateText"></span> - 工作明细</h2>
        <button class="btn" type="button" onclick="backToDate()">返回日期选择</button>
        <table>
            <thead>
                <tr>
                    <th>工作内容</th>
                    <th>工时</th>
                </tr>
            </thead>
            <tbody id="detailTable"></tbody>
        </table>
        <button class="btn btn-success" onclick="saveStaffWork()">保存数据</button>
    </div>

    <div id="pageAdmin" class="hide">
        <h2>管理员后台</h2>
        <button class="btn btn-danger" type="button" onclick="logout()">退出登录</button>

        <div class="split"></div>
        <h3>修改管理员密码</h3>
        <div class="login-item" style="max-width:400px;">
            <label>原密码</label>
            <input type="password" id="oldAdminPwd">
            <label>新密码</label>
            <input type="password" id="newAdminPwd">
            <label>确认新密码</label>
            <input type="password" id="confirmAdminPwd">
            <button class="btn btn-success" type="button" onclick="updateAdminPwd()" style="margin-top:10px;">保存修改</button>
        </div>

        <div class="split"></div>
        <h3>一、员工管理（修改密码/删除）</h3>
        <div class="login-item" style="max-width:400px;">
            <label>新员工姓名</label>
            <input type="text" id="newStaffName">
            <label>登录密码</label>
            <input type="password" id="newStaffPwd">
            <button class="btn btn-success" type="button" onclick="addStaff()" style="margin-top:10px;">新增员工</button>
        </div>
        <div id="staffManageList"></div>

        <div class="split"></div>
        <h3>数据清理</h3>
        <div class="select-row">
            <select id="delStaffSel">
                <option value="">全部员工</option>
            </select>
            <select id="delYearSel"></select>
            <select id="delMonthSel"></select>
            <button class="btn btn-danger" onclick="delMonthData()">删除所选年月数据</button>
        </div>

        <div class="split"></div>
        <h3>二、全员月度工时汇总</h3>
        <div class="select-row">
            <span>选择查询月份：</span>
            <select id="queryYear"></select>
            <select id="queryMonth"></select>
            <button class="btn" onclick="refreshTotalTable()">查询</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>人员</th>
                    <th>首件</th>
                    <th>巡检</th>
                    <th>入库</th>
                    <th>出货</th>
                    <th>外箱标</th>
                    <th>内箱标</th>
                    <th>特标</th>
                    <th>工单打印</th>
                    <th>核对物料</th>
                    <th>扩展项1</th>
                    <th>扩展项2</th>
                    <th>扩展项3</th>
                </tr>
            </thead>
            <tbody id="totalTable"></tbody>
        </table>

        <div class="split"></div>
        <h3>三、员工填写日志管理</h3>
        <div class="select-row">
            <span>选择员工：</span>
            <select id="logStaffSel"></select>
            <span>选择日期：</span>
            <select id="logYearSel"></select>
            <select id="logMonthSel"></select>
            <select id="logDaySel"></select>
            <button class="btn" onclick="showStaffLog()">按日期查询日志</button>
            <button class="btn btn-danger" onclick="clearStaffLog()">清空该员工全部日志</button>
        </div>
        <div class="log-box" id="logContent">暂无日志数据</div>
    </div>
</div>

<script>
const WORK_LIST = ["首件","巡检","入库","出货","外箱标","内箱标","特标","工单打印","核对物料","扩展项1","扩展项2","扩展项3"];
let currStaffId = "";
let currStaffName = "";
let currentDateKey = "";

function initDateSelect() {
    const now = new Date();
    const currYear = now.getFullYear();
    const currMonth = now.getMonth() + 1;
    const currDay = now.getDate();

    const yearSel = document.getElementById("selYear");
    const monthSel = document.getElementById("selMonth");
    const daySel = document.getElementById("selDay");
    const delYearSel = document.getElementById("delYearSel");
    const delMonthSel = document.getElementById("delMonthSel");
    const delStaffSel = document.getElementById("delStaffSel");
    const queryYear = document.getElementById("queryYear");
    const queryMonth = document.getElementById("queryMonth");
    const logStaffSel = document.getElementById("logStaffSel");
    const logYearSel = document.getElementById("logYearSel");
    const logMonthSel = document.getElementById("logMonthSel");
    const logDaySel = document.getElementById("logDaySel");

    for (let y = currYear - 5; y <= currYear + 2; y++) {
        yearSel.innerHTML += `<option value="${y}">${y}</option>`;
        delYearSel.innerHTML += `<option value="${y}">${y}</option>`;
        queryYear.innerHTML += `<option value="${y}">${y}</option>`;
        logYearSel.innerHTML += `<option value="${y}">${y}</option>`;
    }
    for (let m = 1; m <= 12; m++) {
        monthSel.innerHTML += `<option value="${m}">${m}</option>`;
        delMonthSel.innerHTML += `<option value="${m}">${m}</option>`;
        queryMonth.innerHTML += `<option value="${m}">${m}</option>`;
        logMonthSel.innerHTML += `<option value="${m}">${m}</option>`;
    }
    function fillDay(y, m) {
        daySel.innerHTML = "";
        logDaySel.innerHTML = "";
        const maxDay = new Date(y, m, 0).getDate();
        for (let d = 1; d <= maxDay; d++) {
            daySel.innerHTML += `<option value="${d}">${d}</option>`;
            logDaySel.innerHTML += `<option value="${d}">${d}</option>`;
        }
    }
    fillDay(currYear, currMonth);

    yearSel.value = currYear;
    monthSel.value = currMonth;
    daySel.value = currDay;
    delYearSel.value = currYear;
    delMonthSel.value = currMonth;
    queryYear.value = currYear;
    queryMonth.value = currMonth;
    logYearSel.value = currYear;
    logMonthSel.value = currMonth;
    logDaySel.value = currDay;

    delStaffSel.innerHTML = `<option value="">全部员工</option>`;
    logStaffSel.innerHTML = `<option value="">请选择员工</option>`;

    yearSel.onchange = () => fillDay(+yearSel.value, +monthSel.value);
    monthSel.onchange = () => fillDay(+yearSel.value, +monthSel.value);
    logYearSel.onchange = () => fillDay(+logYearSel.value, +logMonthSel.value);
    logMonthSel.onchange = () => fillDay(+logYearSel.value, +logMonthSel.value);
}

function getFormatDate() {
    const y = document.getElementById("selYear").value;
    const m = String(document.getElementById("selMonth").value).padStart(2, "0");
    const d = String(document.getElementById("selDay").value).padStart(2, "0");
    return `${y}-${m}-${d}`;
}

document.addEventListener('DOMContentLoaded', function(){
    document.getElementById('staffLoginBtn').addEventListener('click', staffLogin);
    document.getElementById('adminLoginBtn').addEventListener('click', adminLogin);
    initDateSelect();
});

function switchLogin(type) {
    document.getElementById("staffLogin").classList.add("hide");
    document.getElementById("adminLogin").classList.add("hide");
    if(type === "staff") document.getElementById("staffLogin").classList.remove("hide");
}

function showPage(page) {
    document.getElementById("pageLogin").classList.add("hide");
    document.getElementById("pageStaffDate").classList.add("hide");
    document.getElementById("pageStaffDetail").classList.add("hide");
    document.getElementById("pageAdmin").classList.add("hide");
    if(page === "login") document.getElementById("pageLogin").classList.remove("hide");
    if(page === "staffDate") document.getElementById("pageStaffDate").classList.remove("hide");
    if(page === "staffDetail") document.getElementById("pageStaffDetail").classList.remove("hide");
    if(page === "admin") document.getElementById("pageAdmin").classList.remove("hide");
}

function logout() {
    currStaffId = "";
    currStaffName = "";
    currentDateKey = "";
    showPage("login");
}

async function staffLogin() {
    const name = document.getElementById("staffName").value.trim();
    const pwd = document.getElementById("staffPwd").value.trim();
    if(!name || !pwd) return alert("请输入姓名和密码");
    try{
        const res = await fetch("/api/staff/login", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({name,pwd})
        });
        const json = await res.json();
        if(json.code === 0) {
            currStaffId = json.id;
            currStaffName = json.name;
            document.getElementById("currStaffName").innerText = currStaffName;
            showPage("staffDate");
        } else {
            alert(json.msg);
        }
    }catch(e){
        alert("请求失败，请检查服务状态");
    }
}

async function adminLogin() {
    const user = document.getElementById("adminUser").value.trim();
    const pwd = document.getElementById("adminPwd").value.trim();
    if(!user || !pwd) return alert("请输入账号密码");
    try{
        const res = await fetch("/api/admin/login", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({username:user,pwd})
        });
        const json = await res.json();
        if(json.code === 0) {
            await renderAdminPage();
            showPage("admin");
        } else {
            alert(json.msg);
        }
    }catch(e){
        alert("请求失败，请检查服务状态");
    }
}

async function goDetail() {
    currentDateKey = getFormatDate();
    const y = document.getElementById("selYear").value;
    const m = document.getElementById("selMonth").value;
    const d = document.getElementById("selDay").value;
    document.getElementById("detailStaffName").innerText = currStaffName;
    document.getElementById("selectDateText").innerText = `${y}年${m}月${d}日`;

    const res = await fetch(`/api/getStaffWork/${currStaffId}`);
    const workData = await res.json();
    const dayData = workData[currentDateKey] || WORK_LIST.map(()=>0);
    const table = document.getElementById("detailTable");
    table.innerHTML = "";
    WORK_LIST.forEach((name,idx)=>{
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${name}</td>
            <td><input type="number" step="0.1" id="work${idx}" value="${dayData[idx]}"></td>
        `;
        table.appendChild(tr);
    });
    showPage("staffDetail");
}

function backToDate() {
    showPage("staffDate");
}

async function saveStaffWork() {
    const arr = [];
    WORK_LIST.forEach((_,idx)=>{
        const val = document.getElementById("work"+idx).value || 0;
        arr.push(Number(val));
    });
    await fetch("/api/saveWorkData", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({staffId:currStaffId, day:currentDateKey, workArr:arr})
    });
    alert("保存成功");
}

async function renderAdminPage() {
    const res = await fetch("/api/getAllData");
    const allData = await res.json();
    const staffBox = document.getElementById("staffManageList");
    const delStaffSel = document.getElementById("delStaffSel");
    const logStaffSel = document.getElementById("logStaffSel");

    delStaffSel.innerHTML = "<option value=''>全部员工</option>";
    logStaffSel.innerHTML = "<option value="">请选择员工</option>";
    staffBox.innerHTML = "";

    allData.staffList.forEach(staff=>{
        delStaffSel.innerHTML += `<option value="${staff.id}">${staff.name}</option>`;
        logStaffSel.innerHTML += `<option value="${staff.id}">${staff.name}</option>`;
        const div = document.createElement("div");
        div.className = "staff-row";
        div.innerHTML = `
            <span>姓名：${staff.name}</span>
            <span>原密码：${staff.pwd}</span>
            <input type="text" id="newPwd_${staff.id}" placeholder="输入新密码">
            <button class="btn btn-success" onclick="editStaffPwd('${staff.id}')">修改密码</button>
            <button class="btn btn-danger" onclick="delStaff('${staff.id}')">删除员工</button>
        `;
        staffBox.appendChild(div);
    });
    refreshTotalTable();
}

async function editStaffPwd(staffId){
    const newPwd = document.getElementById(`newPwd_${staffId}`).value.trim();
    if(!newPwd) return alert("请输入新密码");
    const res = await fetch("/api/editStaffPwd",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({staffId,newPwd})
    });
    const json = await res.json();
    alert(json.msg);
    if(json.code === 0) await renderAdminPage();
}

async function refreshTotalTable(){
    const qYear = document.getElementById("queryYear").value;
    const qMonth = document.getElementById("queryMonth").value;
    const prefix = `${qYear}-${String(qMonth).padStart(2,'0')}`;

    const res = await fetch("/api/getAllData");
    const allData = await res.json();
    const table = document.getElementById("totalTable");
    table.innerHTML = "";

    allData.staffList.forEach(staff=>{
        const workSum = WORK_LIST.map(()=>0);
        const staffData = allData.workData[staff.id] || {};
        Object.entries(staffData).forEach(([dateKey, dayArr])=>{
            if(dateKey.startsWith(prefix)){
                dayArr.forEach((val,idx)=> workSum[idx] += Number(val));
            }
        });
        const tr = document.createElement("tr");
        let html = `<td>${staff.name}</td>`;
        workSum.forEach(item=> html += `<td>${item.toFixed(1)}</td>`);
        tr.innerHTML = html;
        table.appendChild(tr);
    });
}

// 按日期查询日志
async function showStaffLog(){
    const sid = document.getElementById("logStaffSel").value;
    const ly = document.getElementById("logYearSel").value;
    const lm = String(document.getElementById("logMonthSel").value).padStart(2,"0");
    const ld = String(document.getElementById("logDaySel").value).padStart(2,"0");
    const targetDate = `${ly}-${lm}-${ld}`;

    if(!sid) return alert("请选择员工");
    const res = await fetch(`/api/getStaffLog/${sid}`);
    const logData = await res.json();
    const logBox = document.getElementById("logContent");

    // 筛选指定日期日志
    const filterLog = logData.filter(item => item.date === targetDate);
    if(filterLog.length === 0){
        logBox.innerText = `${targetDate} 暂无填写记录`;
        return;
    }
    let html = "";
    filterLog.forEach(item=>{
        html += `<p>【${item.date}】 保存时间：${item.time}  数据：${item.data.join(" / ")}</p>`;
    });
    logBox.innerHTML = html;
}

// 清空该员工全部日志
async function clearStaffLog(){
    const sid = document.getElementById("logStaffSel").value;
    if(!sid) return alert("请选择员工");
    if(!confirm("确定清空该员工所有日志？此操作不可恢复！")) return;
    const res = await fetch(`/api/clearStaffLog/${sid}`,{method:"DELETE"});
    const json = await res.json();
    alert(json.msg);
    document.getElementById("logContent").innerText = "暂无日志数据";
}

async function addStaff() {
    const name = document.getElementById("newStaffName").value.trim();
    const pwd = document.getElementById("newStaffPwd").value.trim();
    if(!name || !pwd) return alert("请填写姓名和密码");
    const res = await fetch("/api/addStaff", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({name,pwd})
    });
    const json = await res.json();
    alert(json.msg);
    if(json.code === 0) {
        document.getElementById("newStaffName").value = "";
        document.getElementById("newStaffPwd").value = "";
        await renderAdminPage();
    }
}

async function delStaff(id) {
    if(!confirm("确定删除该员工？数据将一并清除")) return;
    await fetch(`/api/delStaff/${id}`, { method:"DELETE" });
    await renderAdminPage();
    alert("删除成功");
}

async function delMonthData(){
    const adminUser = document.getElementById("adminUser").value;
    const adminPwd = document.getElementById("adminPwd").value;
    const staffId = document.getElementById("delStaffSel").value;
    const y = document.getElementById("delYearSel").value;
    const m = document.getElementById("delMonthSel").value;
    if(!confirm("确定删除所选年月工时数据？")) return;
    const res = await fetch("/api/admin/batchDeleteWork",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            username: adminUser,
            pwd: adminPwd,
            staffId: staffId,
            year: y,
            month: m
        })
    });
    const json = await res.json();
    alert(json.msg);
    await renderAdminPage();
}

async function updateAdminPwd(){
    const oldPwd = document.getElementById("oldAdminPwd").value.trim();
    const newPwd = document.getElementById("newAdminPwd").value.trim();
    const confirmPwd = document.getElementById("confirmAdminPwd").value.trim();

    if(!oldPwd || !newPwd || !confirmPwd){
        return alert("请完整填写所有密码项");
    }
    if(newPwd !== confirmPwd){
        return alert("两次输入的新密码不一致");
    }
    if(newPwd.length < 3){
        return alert("新密码长度不能少于3位");
    }

    const res = await fetch("/api/updateAdminPwd",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({oldPwd, newPwd})
    });
    const json = await res.json();
    alert(json.msg);
    if(json.code === 0){
        document.getElementById("oldAdminPwd").value = "";
        document.getElementById("newAdminPwd").value = "";
        document.getElementById("confirmAdminPwd").value = "";
    }
}

showPage("login");
</script>
</body>
</html>
