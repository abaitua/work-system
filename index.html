<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作量统计系统</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft Yahei",sans-serif;font-size:14px;}
        body{background:#f5f7fa;padding:10px;}
        .container{max-width:1200px;margin:0 auto;background:#fff;padding:15px;border-radius:6px;box-shadow:0 1px 6px #ddd;}
        h2{text-align:center;margin-bottom:12px;color:#333;font-size:18px;}
        h3{margin:10px 0 6px 0;color:#444;font-size:15px;}
        h4{font-size:14px;margin:6px 0;}
        .btn{padding:5px 10px;background:#409eff;color:#fff;border:none;border-radius:3px;cursor:pointer;margin:2px 4px;}
        .btn:hover{background:#66b1ff;}
        .btn-danger{background:#f56c6c;}
        .btn-danger:hover{background:#f78989;}
        .btn-success{background:#67c23a;}
        .btn-success:hover{background:#85ce61;}
        .login-box{max-width:400px;margin:30px auto;border:1px solid #eee;padding:20px;border-radius:6px;}
        .login-item{margin:10px 0;}
        .login-item label{display:block;margin-bottom:3px;}
        .login-item input{width:100%;padding:5px;border:1px solid #ccc;border-radius:3px;}
        .tab{margin:12px 0;text-align:center;}
        .tab button{margin:0 8px;}
        table{width:100%;border-collapse:collapse;margin:10px 0;}
        th,td{border:1px solid #ccc;padding:6px;text-align:center;}
        th{background:#f8f9fa;}
        input[type="number"]{width:100%;padding:5px;border:1px solid #ddd;border-radius:3px;}
        .hide{display:none;}
        .split{margin:12px 0;border-top:1px solid #eee;}
        .select-row{margin:8px 0;gap:8px;display:flex;flex-wrap:wrap;align-items:center;}
        .select-row select{padding:5px;border:1px solid #ccc;border-radius:3px;min-width:90px;}
        .work-item-list{max-width:550px;margin:10px 0;}
        .work-item-row{display:flex;align-items:center;gap:6px;margin:5px 0;padding:5px;border:1px solid #eee;border-radius:3px;}
        .work-item-row input{flex:1;padding:4px;border:1px solid #ccc;border-radius:3px;}
        .time-config-row{display:flex;align-items:center;gap:8px;margin:4px 0;padding:4px;border:1px solid #eee;border-radius:3px;max-width:500px;}
        .time-config-row input{width:70px;padding:4px;}
        #staffManageList > div{margin:4px 0;padding:6px;border:1px solid #eee;border-radius:3px;}
        #staffManageList input{width:110px;padding:4px;margin:0 4px;}
        .total-hour{color:#e64340;font-weight:bold;}
    </style>
</head>
<body>
<div class="container">
    <div id="pageLogin">
        <h2>工作量统计系统 - 登录</h2>
        <div class="tab">
            <button class="btn" type="button" onclick="switchLogin('staff')">员工登录</button>
            <button class="btn btn-success" type="button" onclick="switchLogin('admin')">管理员登录</button>
        </div>
        <div class="login-box" id="staffLogin">
            <div class="login-item">
                <label>姓名</label>
                <input type="text" id="staffName">
            </div>
            <div class="login-item">
                <label>密码</label>
                <input type="password" id="staffPwd">
            </div>
            <div style="text-align:center;">
                <button class="btn btn-success" type="button" id="staffLoginBtn">登录</button>
            </div>
        </div>
        <div class="login-box hide" id="adminLogin">
            <div class="login-item">
                <label>管理员账号</label>
                <input type="text" id="adminUser">
            </div>
            <div class="login-item">
                <label>管理员密码</label>
                <input type="password" id="adminPwd">
            </div>
            <div style="text-align:center;">
                <button class="btn btn-success" type="button" id="adminLoginBtn">登录</button>
            </div>
        </div>
    </div>

    <div id="pageStaffDate" class="hide">
        <h2>欢迎：<span id="currStaffName"></span></h2>
        <button class="btn" type="button" onclick="logout()">退出登录</button>
        <div class="select-row">
            <select id="selYear"></select>
            <select id="selMonth"></select>
            <select id="selDay"></select>
            <button class="btn btn-success" onclick="goDetail()">进入填写</button>
        </div>
    </div>

    <!-- 员工填写页：仅填写次数，自动计算时长 -->
    <div id="pageStaffDetail" class="hide">
        <h2><span id="detailStaffName"></span> <span id="selectDateText"></span> - 工作次数填写</h2>
        <button class="btn" type="button" onclick="backToDate()">返回日期选择</button>
        <table>
            <thead>
                <tr>
                    <th>工作内容</th>
                    <th>单次标准(分钟)</th>
                    <th>填写次数</th>
                    <th>本次时长(分钟)</th>
                </tr>
            </thead>
            <tbody id="detailTable"></tbody>
        </table>
        <div style="margin:8px 0;">当日合计工时：<span id="dayTotalHour" class="total-hour">0.00</span> 小时</div>
        <button class="btn btn-success" type="button" onclick="saveStaffWork()">保存数据</button>
    </div>

    <div id="pageWorkEdit" class="hide">
        <h2>工作内容编辑</h2>
        <button class="btn" onclick="backToAdmin()">返回管理员后台</button>
        <div class="split"></div>
        <div style="max-width:550px;">
            <button class="btn btn-success" onclick="addWorkItem()">新增工作项</button>
            <button class="btn" onclick="saveWorkList()">保存修改</button>
            <div id="workItemList" class="work-item-list"></div>
        </div>
    </div>

    <div id="pageTimeConfig" class="hide">
        <h2>工时标准配置</h2>
        <button class="btn" onclick="backToAdmin()">返回管理员后台</button>
        <div class="split"></div>
        <h4>设置每项工作单次耗时(分钟)，修改后全局生效</h4>
        <div id="timeConfigWrap"></div>
        <button class="btn btn-success" style="margin-top:10px;" onclick="saveTimeConfig()">保存配置</button>
    </div>

    <div id="pageAdmin" class="hide">
        <h2>管理员后台</h2>
        <button class="btn btn-danger" type="button" onclick="logout()">退出登录</button>
        <button class="btn btn-success" onclick="goWorkEdit()">编辑工作内容</button>
        <button class="btn" onclick="goTimeConfig()">工时标准配置</button>

        <div class="split"></div>
        <h3>修改管理员密码</h3>
        <div class="login-item" style="max-width:400px;">
            <label>原密码</label>
            <input type="password" id="oldAdminPwd">
            <label>新密码</label>
            <input type="password" id="newAdminPwd">
            <label>确认新密码</label>
            <input type="password" id="confirmAdminPwd">
            <button class="btn btn-success" type="button" onclick="updateAdminPwd()" style="margin-top:6px;">保存修改</button>
        </div>

        <div class="split"></div>
        <h3>一、员工管理（新增/删除/修改密码）</h3>
        <div class="login-item" style="max-width:400px;">
            <label>新员工姓名</label>
            <input type="text" id="newStaffName">
            <label>登录密码</label>
            <input type="password" id="newStaffPwd">
            <button class="btn btn-success" type="button" onclick="addStaff()" style="margin-top:6px;">新增员工</button>
        </div>
        <div id="staffManageList"></div>

        <div class="split"></div>
        <h3>数据清理</h3>
        <div class="select-row" style="justify-content:flex-start;">
            <select id="delStaffSel">
                <option value="">全部员工</option>
            </select>
            <select id="delYearSel"></select>
            <select id="delMonthSel"></select>
            <button class="btn btn-danger" onclick="delMonthData()">删除所选年月数据</button>
        </div>

        <div class="split"></div>
        <h3>二、全员月度工时汇总（已换算为小时）</h3>
        <div class="select-row" style="justify-content:flex-start;">
            <span>查询月份：</span>
            <select id="queryYear"></select>
            <select id="queryMonth"></select>
            <button class="btn" onclick="refreshTotalTable()">查询</button>
        </div>
        <table>
            <thead id="totalTableHead">
                <tr>
                    <th>人员</th>
                </tr>
            </thead>
            <tbody id="totalTable"></tbody>
        </table>

        <div class="split"></div>
        <h3>三、系统操作日志（UTC+8 北京时间）</h3>
        <div class="select-row" style="justify-content:flex-start;margin:6px 0;">
            <select id="logStaffSel">
                <option value="">全部员工</option>
            </select>
            <input type="date" id="logDateFilter" placeholder="选择日期">
            <button class="btn" onclick="loadLogList()">查询日志</button>
            <button class="btn btn-danger" onclick="clearAllLog()">清空全部日志</button>
        </div>
        <div>
            <table>
                <thead>
                    <tr>
                        <th>操作时间(北京时间)</th>
                        <th>操作人</th>
                        <th>操作类型</th>
                        <th>操作详情</th>
                        <th>工时明细</th>
                    </tr>
                </thead>
                <tbody id="logTable"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
// 全局配置
const API_BASE = "/api";
let STAFF_LIST = [];
// 工作项列表
let WORK_LIST = ["首件","巡检","入库","出货","外箱标","内箱标","特标","工单打印","核对物料"];
// 单次耗时(分钟) 管理员可配置
let WORK_TIME_MAP = {
    "首件": 20,
    "巡检": 20,
    "入库": 10,
    "出货": 10,
    "外箱标": 10,
    "内箱标": 10,
    "特标": 10,
    "工单打印": 10,
    "核对物料": 10
};
let currStaffId = "";
let currStaffName = "";
let currentDateKey = "";

// UTC+8 北京时间格式化
function formatChinaTime(date) {
    const offset = 8 * 60;
    const localDate = new Date(date.getTime() + offset * 60000);
    const year = localDate.getFullYear();
    const month = String(localDate.getMonth() + 1).padStart(2, '0');
    const day = String(localDate.getDate()).padStart(2, '0');
    const h = String(localDate.getHours()).padStart(2, '0');
    const m = String(localDate.getMinutes()).padStart(2, '0');
    const s = String(localDate.getSeconds()).padStart(2, '0');
    return `${year}-${month}-${day} ${h}:${m}:${s}`;
}

// 初始化日期下拉
function initDateSelect() {
    const now = new Date();
    const currYear = now.getFullYear();
    const currMonth = now.getMonth() + 1;
    const currDay = now.getDate();

    const yearSel = document.getElementById("selYear");
    const monthSel = document.getElementById("selMonth");
    const daySel = document.getElementById("selDay");
    const delYearSel = document.getElementById("delYearSel");
    const delMonthSel = document.getElementById("delMonthSel");
    const delStaffSel = document.getElementById("delStaffSel");
    const queryYear = document.getElementById("queryYear");
    const queryMonth = document.getElementById("queryMonth");

    for (let y = currYear - 5; y <= currYear + 2; y++) {
        yearSel.innerHTML += `<option value="${y}">${y}</option>`;
        delYearSel.innerHTML += `<option value="${y}">${y}</option>`;
        queryYear.innerHTML += `<option value="${y}">${y}</option>`;
    }
    for (let m = 1; m <= 12; m++) {
        monthSel.innerHTML += `<option value="${m}">${m}</option>`;
        delMonthSel.innerHTML += `<option value="${m}">${m}</option>`;
        queryMonth.innerHTML += `<option value="${m}">${m}</option>`;
    }
    function fillDay(y, m) {
        daySel.innerHTML = "";
        const maxDay = new Date(y, m, 0).getDate();
        for (let d = 1; d <= maxDay; d++) {
            daySel.innerHTML += `<option value="${d}">${d}</option>`;
        }
    }
    fillDay(currYear, currMonth);

    yearSel.value = currYear;
    monthSel.value = currMonth;
    daySel.value = currDay;
    delYearSel.value = currYear;
    delMonthSel.value = currMonth;
    queryYear.value = currYear;
    queryMonth.value = currMonth;
    delStaffSel.innerHTML = `<option value="">全部员工</option>`;

    yearSel.onchange = () => fillDay(+yearSel.value, +monthSel.value);
    monthSel.onchange = () => fillDay(+yearSel.value, +monthSel.value);
}

function getFormatDate() {
    const y = document.getElementById("selYear").value;
    const m = String(document.getElementById("selMonth").value).padStart(2, "0");
    const d = String(document.getElementById("selDay").value).padStart(2, "0");
    return `${y}-${m}-${d}`;
}

// 页面切换
function showPage(page) {
    document.querySelectorAll('.container > div').forEach(el => el.classList.add('hide'));
    const pageMap = {
        login: 'pageLogin',
        staffDate: 'pageStaffDate',
        staffDetail: 'pageStaffDetail',
        admin: 'pageAdmin',
        workEdit: 'pageWorkEdit',
        timeConfig: 'pageTimeConfig'
    };
    if(pageMap[page]) document.getElementById(pageMap[page]).classList.remove('hide');
}

// 工时标准配置
function goTimeConfig() {
    showPage("timeConfig");
    renderTimeConfig();
}
function backToAdmin() {
    showPage("admin");
    refreshTotalTable();
}
function renderTimeConfig() {
    const wrap = document.getElementById("timeConfigWrap");
    wrap.innerHTML = "";
    WORK_LIST.forEach(name => {
        const min = WORK_TIME_MAP[name] || 10;
        const div = document.createElement("div");
        div.className = "time-config-row";
        div.innerHTML = `
            <span style="width:100px;">${name}</span>
            <input type="number" min="0" value="${min}" data-name="${name}">
            <span>分钟/次</span>
        `;
        wrap.appendChild(div);
    });
}
function saveTimeConfig() {
    const inputs = document.querySelectorAll(".time-config-row input");
    inputs.forEach(inp => {
        const name = inp.dataset.name;
        const val = Number(inp.value) || 0;
        WORK_TIME_MAP[name] = val;
    });
    alert("工时标准配置保存成功");
    backToAdmin();
}

// 工作项编辑
async function goWorkEdit() {
    showPage("workEdit");
    await renderWorkEditList();
}
async function renderWorkEditList() {
    const wrap = document.getElementById("workItemList");
    wrap.innerHTML = "";
    WORK_LIST.forEach((item, idx) => {
        const div = document.createElement("div");
        div.className = "work-item-row";
        div.innerHTML = `
            <input type="text" value="${item}" data-idx="${idx}">
            <button class="btn btn-danger" onclick="delWorkItem(${idx})">删除</button>
        `;
        wrap.appendChild(div);
    });
}
function addWorkItem() {
    const wrap = document.getElementById("workItemList");
    const div = document.createElement("div");
    div.className = "work-item-row";
    const newIdx = wrap.children.length;
    div.innerHTML = `
        <input type="text" placeholder="请输入工作内容" data-idx="${newIdx}">
        <button class="btn btn-danger" onclick="delWorkItem(${newIdx})">删除</button>
    `;
    wrap.appendChild(div);
}
function delWorkItem(idx) {
    const rows = Array.from(document.querySelectorAll(".work-item-row"));
    rows[idx]?.remove();
}
async function saveWorkList() {
    const rows = document.querySelectorAll(".work-item-row input");
    const newList = [];
    rows.forEach(input => {
        const val = input.value.trim();
        if(val) newList.push(val);
    });
    if(newList.length === 0) return alert("工作项不能为空");
    WORK_LIST = newList;
    alert("工作项保存成功");
    backToAdmin();
}

// 登录切换
function switchLogin(type) {
    document.getElementById("staffLogin").classList.add("hide");
    document.getElementById("adminLogin").classList.add("hide");
    if(type === "staff") document.getElementById("staffLogin").classList.remove("hide");
    if(type === "admin") document.getElementById("adminLogin").classList.remove("hide");
}
function logout() {
    currStaffId = "";
    currStaffName = "";
    currentDateKey = "";
    showPage("login");
}

// 员工登录
async function staffLogin() {
    const name = document.getElementById("staffName").value.trim();
    const pwd = document.getElementById("staffPwd").value.trim();
    if(!name || !pwd) return alert("请输入姓名和密码");
    currStaffName = name;
    document.getElementById("currStaffName").innerText = currStaffName;
    showPage("staffDate");
}

// 管理员登录
async function adminLogin() {
    const user = document.getElementById("adminUser").value.trim();
    const pwd = document.getElementById("adminPwd").value.trim();
    if(!user || !pwd) return alert("请输入账号密码");
    await renderAdminPage();
    showPage("admin");
}

// 员工填写页面 - 次数录入 + 自动计算
async function goDetail() {
    currentDateKey = getFormatDate();
    const y = document.getElementById("selYear").value;
    const m = document.getElementById("selMonth").value;
    const d = document.getElementById("selDay").value;
    document.getElementById("detailStaffName").innerText = currStaffName;
    document.getElementById("selectDateText").innerText = `${y}年${m}月${d}日`;

    let countArr = WORK_LIST.map(()=>0);
    try{
        const res = await fetch(`${API_BASE}/work/get?staffName=${encodeURIComponent(currStaffName)}&date=${currentDateKey}`);
        const resData = await res.json();
        if(resData.code === 0 && resData.data) countArr = resData.data;
    }catch(e){}

    const table = document.getElementById("detailTable");
    table.innerHTML = "";
    WORK_LIST.forEach((name,idx)=>{
        const onceMin = WORK_TIME_MAP[name] || 10;
        const count = Number(countArr[idx]) || 0;
        const totalMin = count * onceMin;
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${name}</td>
            <td>${onceMin}</td>
            <td><input type="number" min="0" id="count${idx}" value="${count}" oninput="calcDayTotal()"></td>
            <td id="min${idx}">${totalMin}</td>
        `;
        table.appendChild(tr);
    });
    calcDayTotal();
    showPage("staffDetail");
}

// 实时计算当日总工时
function calcDayTotal(){
    let totalMin = 0;
    WORK_LIST.forEach((name, idx) => {
        const count = Number(document.getElementById(`count${idx}`).value) || 0;
        const onceMin = WORK_TIME_MAP[name] || 10;
        const itemMin = count * onceMin;
        document.getElementById(`min${idx}`).innerText = itemMin;
        totalMin += itemMin;
    });
    const totalHour = (totalMin / 60).toFixed(2);
    document.getElementById("dayTotalHour").innerText = totalHour;
}

function backToDate() {
    showPage("staffDate");
}

// 保存员工填写的次数
async function saveStaffWork() {
    const countArr = [];
    WORK_LIST.forEach((_,idx)=>{
        const val = Number(document.getElementById("count"+idx).value) || 0;
        countArr.push(val);
    });
    try{
        const res = await fetch(`${API_BASE}/work/save`,{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                staffName: currStaffName,
                date: currentDateKey,
                countArr: countArr
            })
        });
        const resData = await res.json();
        alert(resData.msg || "保存成功");
    }catch(e){
        alert("保存失败，请检查服务");
    }
}

// 管理员 - 加载员工列表 & 渲染页面
async function renderAdminPage() {
    const delStaffSel = document.getElementById("delStaffSel");
    const logStaffSel = document.getElementById("logStaffSel");
    const staffBox = document.getElementById("staffManageList");

    try {
        const res = await fetch(`${API_BASE}/staff/list`);
        const resData = await res.json();
        if(resData.code !== 0) {
            alert(resData.msg || "获取员工列表失败");
            return;
        }
        STAFF_LIST = resData.data || [];
    } catch (e) {
        alert("接口请求异常，请检查后端服务");
        return;
    }

    delStaffSel.innerHTML = "<option value=''>全部员工</option>";
    logStaffSel.innerHTML = "<option value=''>全部员工</option>";
    staffBox.innerHTML = "<h4>现有员工列表</h4>";

    STAFF_LIST.forEach(staff => {
        const { id, name, pwd } = staff;
        delStaffSel.innerHTML += `<option value="${id}">${name}</option>`;
        logStaffSel.innerHTML += `<option value="${id}">${name}</option>`;
        const div = document.createElement("div");
        div.innerHTML = `
            姓名：${name} &nbsp;&nbsp; 密码：${pwd}
            <input type="password" id="editPwd_${id}" placeholder="新密码">
            <button class="btn" onclick="updateStaffPwd('${id}')">修改密码</button>
            <button class="btn btn-danger" onclick="delStaff('${id}')">删除</button>
        `;
        staffBox.appendChild(div);
    });

    refreshTotalTable();
    loadLogList();
}

// 新增员工
async function addStaff() {
    const name = document.getElementById("newStaffName").value.trim();
    const pwd = document.getElementById("newStaffPwd").value.trim();
    if(!name || !pwd) return alert("请填写姓名和密码");

    try {
        const res = await fetch(`${API_BASE}/staff/add`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, pwd })
        });
        const resData = await res.json();
        alert(resData.msg);
        if(resData.code === 0) {
            document.getElementById("newStaffName").value = "";
            document.getElementById("newStaffPwd").value = "";
            await renderAdminPage();
        }
    } catch (e) {
        alert("请求失败");
    }
}

// 删除员工
async function delStaff(id) {
    if(!confirm("确定删除该员工？关联数据将一并清除")) return;
    try {
        const res = await fetch(`${API_BASE}/staff/delete?id=${id}`, {
            method: "DELETE"
        });
        const resData = await res.json();
        alert(resData.msg);
        if(resData.code === 0) {
            await renderAdminPage();
        }
    } catch (e) {
        alert("请求失败");
    }
}

// 修改员工密码
async function updateStaffPwd(staffId) {
    const newPwd = document.getElementById(`editPwd_${staffId}`).value.trim();
    if(!newPwd) return alert("请输入新密码");
    if(newPwd.length < 3) return alert("密码长度不能少于3位");

    try {
        const res = await fetch(`${API_BASE}/staff/updatePwd`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ id: staffId, newPwd })
        });
        const resData = await res.json();
        alert(resData.msg);
        if(resData.code === 0) {
            await renderAdminPage();
        }
    } catch (e) {
        alert("请求失败");
    }
}

// 删除月度工时数据
async function delMonthData(){
    const staffId = document.getElementById("delStaffSel").value;
    const y = document.getElementById("delYearSel").value;
    const m = document.getElementById("delMonthSel").value;
    if(!confirm("确定删除所选年月工时数据？")) return;

    try {
        const res = await fetch(`${API_BASE}/work/delMonth`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ staffId, year: y, month: m })
        });
        const resData = await res.json();
        alert(resData.msg);
        await renderAdminPage();
    } catch (e) {
        alert("请求失败");
    }
}

// 管理员修改密码
async function updateAdminPwd(){
    const oldPwd = document.getElementById("oldAdminPwd").value.trim();
    const newPwd = document.getElementById("newAdminPwd").value.trim();
    const confirmPwd = document.getElementById("confirmAdminPwd").value.trim();

    if(!oldPwd || !newPwd || !confirmPwd){
        return alert("请完整填写所有密码项");
    }
    if(newPwd !== confirmPwd){
        return alert("两次输入的新密码不一致");
    }
    if(newPwd.length < 3){
        return alert("新密码长度不能少于3位");
    }

    try {
        const res = await fetch(`${API_BASE}/admin/updatePwd`, {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({ oldPwd, newPwd })
        });
        const json = await res.json();
        alert(json.msg);
        if(json.code === 0){
            document.getElementById("oldAdminPwd").value = "";
            document.getElementById("newAdminPwd").value = "";
            document.getElementById("confirmAdminPwd").value = "";
        }
    } catch (e) {
        alert("请求失败");
    }
}

// 月度工时汇总
async function refreshTotalTable(){
    const qYear = document.getElementById("queryYear").value;
    const qMonth = document.getElementById("queryMonth").value;
    const prefix = `${qYear}-${String(qMonth).padStart(2,'0')}`;

    const tableHead = document.getElementById("totalTableHead");
    const tableBody = document.getElementById("totalTable");

    let headHtml = `<tr><th>人员</th>`;
    WORK_LIST.forEach(item => headHtml += `<th>${item}(小时)</th>`);
    headHtml += `<th>月度合计(小时)</th></tr>`;
    tableHead.innerHTML = headHtml;
    tableBody.innerHTML = "";

    for(let staff of STAFF_LIST){
        let monthTotalMin = 0;
        const itemHourArr = WORK_LIST.map(()=>0);
        const lastDay = new Date(qYear, qMonth, 0).getDate();

        for(let d=1; d<=lastDay; d++){
            const dateStr = `${qYear}-${String(qMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            try{
                const res = await fetch(`${API_BASE}/work/get?staffName=${encodeURIComponent(staff.name)}&date=${dateStr}`);
                const resData = await res.json();
                if(resData.code !== 0 || !resData.data) continue;
                const countArr = resData.data;

                countArr.forEach((count, idx) => {
                    const name = WORK_LIST[idx];
                    const onceMin = WORK_TIME_MAP[name] || 10;
                    const dayMin = count * onceMin;
                    monthTotalMin += dayMin;
                    itemHourArr[idx] += dayMin / 60;
                });
            }catch(e){continue;}
        }

        const tr = document.createElement("tr");
        let html = `<td>${staff.name}</td>`;
        itemHourArr.forEach(h => html += `<td>${h.toFixed(2)}</td>`);
        const totalHour = (monthTotalMin / 60).toFixed(2);
        html += `<td class="total-hour">${totalHour}</td>`;
        tr.innerHTML = html;
        tableBody.appendChild(tr);
    }
}
