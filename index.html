<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工时统计系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }
        .container {
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin: 10px 0;
        }
        input, select, button {
            padding: 6px 10px;
            font-size: 14px;
            border: 1px solid #999;
            border-radius: 4px;
        }
        .btn-danger {
            background-color: #f53f3f;
            color: #fff;
            border: none;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: center;
        }
        .hide {
            display: none;
        }
    </style>
</head>
<body>
    <!-- 日期选择区域 -->
    <div class="container">
        <div class="row">
            <span>选择日期：</span>
            <select id="yearSel"></select>
            <select id="monthSel"></select>
            <select id="daySel"></select>
            <button onclick="loadDateData()">加载对应日期数据</button>
        </div>
    </div>

    <!-- 登录区域 -->
    <div class="container" id="loginBox">
        <h3>系统登录</h3>
        <div class="row">
            <input type="text" id="loginAccount" placeholder="账号/姓名">
            <input type="password" id="loginPwd" placeholder="密码">
            <button onclick="adminLogin()">管理员登录</button>
            <button onclick="staffLogin()">员工登录</button>
        </div>
    </div>

    <!-- 管理员面板 -->
    <div class="container hide" id="adminBox">
        <h3>管理员管理后台</h3>
        <!-- 新增员工 -->
        <div class="row">
            <input type="text" id="newStaffName" placeholder="员工姓名">
            <input type="password" id="newStaffPwd" placeholder="员工密码">
            <button onclick="addStaff()">新增员工</button>
        </div>

        <!-- 批量数据删除（清理存储） -->
        <div class="row" style="margin-top:15px;padding-top:10px;border-top:1px solid #eee;">
            <h4>批量清理工时数据</h4>
        </div>
        <div class="row">
            <select id="delStaffSel">
                <option value="">全部员工</option>
            </select>
            <select id="delYearSel"></select>
            <select id="delMonthSel"></select>
            <button class="btn-danger" onclick="delMonthData()">删除所选年月数据</button>
            <button class="btn-danger" onclick="delAllWorkData()">清空全部工时数据</button>
        </div>

        <!-- 员工列表 -->
        <div id="staffList" style="margin-top:15px;"></div>
    </div>

    <!-- 员工填报面板 -->
    <div class="container hide" id="staffBox">
        <h3>工时填报</h3>
        <div id="workCheck"></div>
        <div class="row">
            <button onclick="saveWorkData()">保存当日数据</button>
        </div>
        <div style="margin-top:15px;">
            <h4>当月填报记录</h4>
            <div id="workTable"></div>
        </div>
    </div>

    <script>
        // 全局变量
        let now = new Date();
        let currYear = now.getFullYear();
        let currMonth = now.getMonth() + 1;
        let currDay = now.getDate();
        let loginStaffId = "";
        const workList = ["首件","巡检","入库","出货","外箱标","内箱标","特标","工单打印","核对物料"];

        // 初始化年月日下拉框
        function initDateSelect() {
            const yearSel = document.getElementById("yearSel");
            const monthSel = document.getElementById("monthSel");
            const daySel = document.getElementById("daySel");
            const delYearSel = document.getElementById("delYearSel");
            const delMonthSel = document.getElementById("delMonthSel");

            // 年份：前后5年
            for (let y = currYear - 5; y <= currYear + 2; y++) {
                yearSel.innerHTML += `<option value="${y}">${y}年</option>`;
                delYearSel.innerHTML += `<option value="${y}">${y}</option>`;
            }
            // 月份
            for (let m = 1; m <= 12; m++) {
                monthSel.innerHTML += `<option value="${m}">${m}月</option>`;
                delMonthSel.innerHTML += `<option value="${m}">${m}</option>`;
            }
            // 日期
            fillDay(currYear, currMonth);

            // 默认选中当前日期
            yearSel.value = currYear;
            monthSel.value = currMonth;
            daySel.value = currDay;
            delYearSel.value = currYear;
            delMonthSel.value = currMonth;

            // 切换年月，自动更新最大天数
            yearSel.onchange = () => fillDay(yearSel.value, monthSel.value);
            monthSel.onchange = () => fillDay(yearSel.value, monthSel.value);
        }

        // 填充日期（适配每月天数）
        function fillDay(y, m) {
            const daySel = document.getElementById("daySel");
            daySel.innerHTML = "";
            const maxDay = new Date(y, m, 0).getDate();
            for (let d = 1; d <= maxDay; d++) {
                daySel.innerHTML += `<option value="${d}">${d}日</option>`;
            }
        }

        // 获取格式化日期 key 例：2026-06-13
        function getDateKey() {
            const y = document.getElementById("yearSel").value;
            const m = String(document.getElementById("monthSel").value).padStart(2, "0");
            const d = String(document.getElementById("daySel").value).padStart(2, "0");
            return `${y}-${m}-${d}`;
        }

        // 通用请求方法
        async function reqGet(url) {
            let res = await fetch(url);
            return await res.json();
        }
        async function reqPost(url, data) {
            let res = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });
            return await res.json();
        }

        // 加载选中日期数据
        async function loadDateData() {
            if (!loginStaffId) {
                alert("请先登录员工账号！");
                return;
            }
            let dateKey = getDateKey();
            let allData = await reqGet("/api/getAllData");
            let workData = allData.workData[loginStaffId]?.[dateKey] || [];
            renderWorkCheck(workData);
            renderMonthTable();
        }

        // 渲染工时复选框
        function renderWorkCheck(checkedArr) {
            let html = "";
            workList.forEach(item => {
                let checked = checkedArr.includes(item) ? "checked" : "";
                html += `<label style="margin-right:15px;"><input type="checkbox" ${checked} value="${item}">${item}</label>`;
            });
            document.getElementById("workCheck").innerHTML = html;
        }

        // 保存当日工时
        async function saveWorkData() {
            let checkList = document.querySelectorAll("#workCheck input:checked");
            let workArr = Array.from(checkList).map(item => item.value);
            let dateKey = getDateKey();
            let res = await reqPost("/api/saveWorkData", {
                staffId: loginStaffId,
                day: dateKey,
                workArr: workArr
            });
            alert(res.msg);
            renderMonthTable();
        }

        // 渲染当月记录表格
        async function renderMonthTable() {
            let allData = await reqGet("/api/getAllData");
            let staffData = allData.workData[loginStaffId] || {};
            let y = document.getElementById("yearSel").value;
            let m = String(document.getElementById("monthSel").value).padStart(2, "0");
            let prefix = `${y}-${m}`;

            let html = "<table><tr><th>日期</th><th>工作内容</th></tr>";
            for (let key in staffData) {
                if (key.startsWith(prefix)) {
                    html += `<tr><td>${key}</td><td>${staffData[key].join("、")}</td></tr>`;
                }
            }
            html += "</table>";
            document.getElementById("workTable").innerHTML = html;
        }

        // ========== 登录逻辑 ==========
        async function adminLogin() {
            let username = document.getElementById("loginAccount").value;
            let pwd = document.getElementById("loginPwd").value;
            let res = await reqPost("/api/admin/login", { username, pwd });
            if (res.code === 0) {
                document.getElementById("loginBox").classList.add("hide");
                document.getElementById("adminBox").classList.remove("hide");
                refreshStaffList();
            } else {
                alert(res.msg);
            }
        }

        async function staffLogin() {
            let name = document.getElementById("loginAccount").value;
            let pwd = document.getElementById("loginPwd").value;
            let res = await reqPost("/api/staff/login", { name, pwd });
            if (res.code === 0) {
                loginStaffId = res.id;
                document.getElementById("loginBox").classList.add("hide");
                document.getElementById("staffBox").classList.remove("hide");
                loadDateData();
            } else {
                alert(res.msg);
            }
        }

        // ========== 管理员功能 ==========
        // 刷新员工列表&下拉选择框
        async function refreshStaffList() {
            let allData = await reqGet("/api/getAllData");
            let staffList = allData.staffList;
            let delSel = document.getElementById("delStaffSel");
            let listHtml = "";

            // 重置下拉框
            delSel.innerHTML = `<option value="">全部员工</option>`;
            staffList.forEach(item => {
                delSel.innerHTML += `<option value="${item.id}">${item.name}</option>`;
                listHtml += `<div style="margin:5px 0;">${item.name} <button class="btn-danger" onclick="delStaff('${item.id}')">删除员工</button></div>`;
            });
            document.getElementById("staffList").innerHTML = listHtml;
        }

        // 新增员工
        async function addStaff() {
            let name = document.getElementById("newStaffName").value;
            let pwd = document.getElementById("newStaffPwd").value;
            if (!name || !pwd) {
                alert("请填写完整信息！");
                return;
            }
            let res = await reqPost("/api/addStaff", { name, pwd });
            alert(res.msg);
            refreshStaffList();
        }

        // 删除单个员工
        async function delStaff(id) {
            if (!confirm("确定删除该员工？")) return;
            await fetch(`/api/delStaff/${id}`, { method: "DELETE" });
            refreshStaffList();
        }

        // 删除指定年月工时数据
        async function delMonthData() {
            if (!confirm("确定删除所选年月的工时数据？")) return;
            let username = document.getElementById("loginAccount").value;
            let pwd = document.getElementById("loginPwd").value;
            let staffId = document.getElementById("delStaffSel").value;
            let y = document.getElementById("delYearSel").value;
            let m = document.getElementById("delMonthSel").value;

            let res = await reqPost("/api/admin/batchDeleteWork", {
                username, pwd, staffId, year: y, month: m
            });
            alert(res.msg);
            refreshStaffList();
        }

        // 清空全部工时数据
        async function delAllWorkData() {
            if (!confirm("⚠️ 危险操作！将清空所有员工全部工时数据，确定继续？")) return;
            let username = document.getElementById("loginAccount").value;
            let pwd = document.getElementById("loginPwd").value;

            let res = await reqPost("/api/admin/batchDeleteWork", { username, pwd });
            alert(res.msg);
            refreshStaffList();
        }

        // 页面初始化
        window.onload = function () {
            initDateSelect();
        }
    </script>
</body>
</html>
